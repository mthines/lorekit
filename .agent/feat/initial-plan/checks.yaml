  kind: command
  setup: "supabase start; seed entries under repo::mthines/gw-tools and repo::mthines/agent-skills"
  run: "nx test mcp-core --testNamePattern='owner wildcard search'"
  expect: "1 passed"
  status: pending

- id: AC-11
  requirement: R11
  ears: "When nx run-many -t typecheck,test,lint is run from the repo root, both mcp-core and mcp-server shall pass with zero errors"
  kind: command
  setup: "supabase start; pnpm install"
  run: "nx run-many -t typecheck,test,lint --all"
  expect: "Successfully ran targets typecheck, test, lint for 2 projects"
  status: pending

