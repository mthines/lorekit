# ─────────────────────────────────────────────────────────────────────────────
# CI — validation gate for pull requests.
#
# This is where tests run, on PRs targeting main. It runs on `pull_request`
# only (not `push`) so a PR branch is validated exactly once per commit instead
# of twice (a push event + a pull_request event both firing). `main` is handled
# by deploy.yml, which trusts these required checks and does NOT re-run the suite.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]

# One run per PR; a newer push cancels the in-flight run to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ── Detect whether API/backend code changed ──────────────────────────────────
  #    Gates the (expensive) integration job so a docs- or web-only change does
  #    not boot a local Supabase. Unit typecheck/test/lint is NOT gated here —
  #    `nx affected` in `check` already scopes itself to the changed packages.
  changes:
    name: Detect API changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare changed paths against the API globs
        id: filter
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          BEFORE: ${{ github.event.before }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            BASE="$PR_BASE"
          else
            BASE="$BEFORE"
          fi
          # Fall back to the parent commit for first pushes / missing base SHAs.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi
          echo "Comparing ${BASE}...HEAD"
          CHANGED="$(git diff --name-only "${BASE}" HEAD)"
          echo "$CHANGED"
          if printf '%s\n' "$CHANGED" | grep -qE '^(packages/mcp-core/|packages/mcp-server/|supabase/functions/|supabase/migrations/|supabase/config\.toml|package\.json|pnpm-lock\.yaml|\.github/workflows/ci\.yml)'; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Typecheck + Test + Lint (only affected packages) ─────────────────────────
  check:
    name: Typecheck, Test & Lint (affected)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # NX affected needs history to diff against the base

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: NX — typecheck, test, lint (affected)
        run: pnpm nx affected -t typecheck,test,lint --parallel=3
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          NX_HEAD: ${{ github.sha }}

  # ── Integration test — live MCP endpoint on a local Supabase ─────────────────
  #    Boots a full local stack (migrations applied), which serves the real Edge
  #    Functions, then runs the one live-endpoint spec (smoke.integration) that
  #    the unit run skips. This is the pre-merge integration gate: the same test
  #    the deploy pipeline later runs against staging, but here against localhost.
  integration:
    name: Integration tests (local Supabase)
    runs-on: ubuntu-latest
    needs: [check, changes]
    # Only run when API/backend code changed. A skipped required check is treated
    # as passing by branch protection, so this does not block docs/web-only PRs.
    if: needs.changes.outputs.api == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies migrations, serves functions)
        run: supabase start

      - name: Lint database schema (informational)
        run: supabase db lint --level warning || true

      - name: Capture local service-role key
        id: supabase
        run: echo "service_role_key=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> "$GITHUB_OUTPUT"

      - name: Wait for edge functions to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:54321/functions/v1/health >/dev/null 2>&1; then
              echo "Edge functions ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::Edge functions did not become ready in time"
          exit 1

      - name: Run integration test against local MCP endpoint
        run: pnpm nx test mcp-server -- smoke.integration
        env:
          LOREKIT_SMOKE_URL: http://127.0.0.1:54321/functions/v1/mcp
          LOREKIT_SMOKE_TOKEN: ${{ steps.supabase.outputs.service_role_key }}

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
