# ─────────────────────────────────────────────────────────────────────────────
# CI — validation gate for pull requests and feature branches.
#
# `main` is deliberately excluded here: merges to main are handled by
# deploy.yml, which re-runs the full suite before deploying. Keeping main out
# of this workflow is what removes the old duplicate "check + migrate" runs.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

# One run per ref; a newer push cancels an in-flight PR run to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # ── Typecheck + Test + Lint (only affected packages) ─────────────────────────
  check:
    name: Typecheck, Test & Lint (affected)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # NX affected needs history to diff against the base

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: NX — typecheck, test, lint (affected)
        run: pnpm nx affected -t typecheck,test,lint --parallel=3
        env:
          NX_BASE: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          NX_HEAD: ${{ github.sha }}

  # ── Next.js production build compiles ────────────────────────────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    env:
      # Dummy values — real values live in Vercel. This only proves the build compiles.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_APP_URL: https://localhost:3001
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app (production)
        run: pnpm nx build web --configuration=production

  # ── Migrations apply cleanly against an ephemeral local database ─────────────
  #    This is the pre-merge migration gate: if a migration is broken it fails
  #    here, before it can ever reach staging or production. Enable this job as a
  #    required status check on `main` so bad migrations cannot be merged.
  migrations:
    name: Validate migrations (local)
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (applies every migration)
        run: supabase start

      - name: Lint database schema (informational)
        run: supabase db lint --level warning || true

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
